<!doctype html>
<html class="light" lang="en">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>CS Scholar Portal | Admin Login</title>
    <link href="https://fonts.googleapis.com" rel="preconnect" />
    <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Manrope:wght@700;800&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script src="../shared/tailwind-config.js"></script>
    <script src="../shared/theme-init.js"></script>
    <link href="../shared/styles.css" rel="stylesheet" />
    <script defer src="../shared/portal.js"></script>
    <script type="module" defer src="./auth.js"></script>
  </head>
  <body
    class="portal-shell overflow-hidden bg-[linear-gradient(180deg,#f5f9ff_0%,#ecf3ff_42%,#f8f9fa_100%)] font-body text-on-surface dark:bg-[linear-gradient(180deg,#020617_0%,#081225_45%,#020617_100%)] selection:bg-primary-fixed selection:text-primary"
    data-page="login"
  >
    <div class="absolute inset-0 opacity-60 pointer-events-none">
      <div
        class="absolute left-[-10%] top-[-10%] h-96 w-96 rounded-full bg-blue-200/40 blur-3xl dark:bg-blue-900/20"
      ></div>
      <div
        class="absolute bottom-[-10%] right-[-10%] h-[30rem] w-[30rem] rounded-full bg-primary-fixed/50 blur-3xl dark:bg-primary/20"
      ></div>
    </div>

    <main class="relative flex min-h-screen items-center justify-center p-4">
      <div class="w-full max-w-md">
        <div class="mb-8 text-center">
          <div
             class="mx-auto flex h-20 w-20 items-center justify-center rounded-2xl bg-primary text-white shadow-lg mb-6"
           >
             <span class="material-symbols-outlined text-[36px]">shield_person</span>
          </div>
          <h1 class="font-headline text-3xl font-extrabold text-primary">
            Admin Access
          </h1>
          <p class="mt-2 text-on-surface-variant">
            Course Rep & Moderator Login
          </p>
        </div>

        <div class="rounded-[2.5rem] bg-white/80 p-8 shadow-[0px_20px_60px_rgba(0,35,111,0.08)] backdrop-blur-md dark:bg-slate-900/80 sm:p-10">
          <form id="loginForm" class="space-y-6">
            <div class="space-y-2">
              <label class="block text-sm font-semibold text-primary" for="email">
                Email Address
              </label>
              <input
                id="email"
                type="email"
                required
                class="w-full rounded-2xl border border-outline bg-surface-container-lowest px-5 py-4 text-on-surface outline-none transition-all focus:border-secondary focus:ring-0"
                placeholder="admin@school.edu"
              />
            </div>
            
            <div class="space-y-2">
              <label class="block text-sm font-semibold text-primary" for="password">
                Password
              </label>
              <input
                id="password"
                type="password"
                required
                class="w-full rounded-2xl border border-outline bg-surface-container-lowest px-5 py-4 text-on-surface outline-none transition-all focus:border-secondary focus:ring-0"
                placeholder="••••••••"
              />
            </div>

            <div id="loginError" class="hidden rounded-xl bg-error-container px-4 py-3 text-sm text-on-error-container"></div>

            <button
              type="submit"
              class="flex w-full items-center justify-center gap-2 rounded-xl bg-primary px-8 py-4 font-headline font-bold text-white transition-all duration-300 hover:bg-primary/90 disabled:opacity-50"
            >
              <span>Sign In</span>
              <span class="material-symbols-outlined">login</span>
            </button>
          </form>
        </div>

        <div class="mt-8 text-center text-sm font-medium text-on-surface-variant">
          <a href="../home/index.html" class="inline-flex items-center gap-1 hover:text-primary transition-colors">
            <span class="material-symbols-outlined text-[18px]">arrow_back</span>
            Return to Portal Home
          </a>
        </div>
      </div>
    </main>
  </body>
</html>
