<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ONLINE BIO-DATA PORTAL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        'fut-blue': '#1e3a8a',
                        'fut-gold': '#fbbf24',
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        mono: ['JetBrains Mono', 'monospace'],
                    },
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer base {
            body {
                @apply font-sans bg-gray-50 text-gray-900 antialiased transition-colors duration-300;
            }
            .dark body {
                @apply bg-neutral-950 text-neutral-100;
            }
        }
        @media print {
            .no-print { display: none !important; }
            body { background-color: white !important; }
        }
    </style>
</head>
<body class="">
    <!-- Login Page -->
    <div id="loginPage" class="flex min-h-screen items-center justify-center bg-gray-50 p-4 dark:bg-neutral-950 transition-colors duration-300">
        <div class="w-full max-w-md animate-in">
            <div class="text-center mb-10">
                <div class="mx-auto flex h-20 w-20 items-center justify-center rounded-3xl bg-fut-blue shadow-2xl shadow-fut-blue/20 mb-6">
                    <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-shield-check"><path d="M20 13c0 5-3.5 7.5-7.66 8.95a1 1 0 0 1-.67-.01C7.5 20.5 4 18 4 13V6a1 1 0 0 1 1-1c2 0 4.5-1.2 6.24-2.72a1.17 1.17 0 0 1 1.52 0C14.51 3.81 17 5 19 5a1 1 0 0 1 1 1z"/><path d="m9 12 2 2 4-4"/></svg>
                </div>
                <h1 class="text-2xl font-black tracking-tight text-neutral-900 dark:text-neutral-100 uppercase leading-none">Bio-Data Portal</h1>
                <p class="text-neutral-500 dark:text-neutral-400 mt-3 text-sm font-medium italic">Student Access Gateway</p>
            </div>

            <div class="rounded-[2.5rem] bg-white dark:bg-neutral-900 p-10 border border-neutral-200 dark:border-neutral-800 shadow-2xl shadow-neutral-200/50 dark:shadow-none space-y-8">
                <div class="space-y-2">
                    <label for="studentIdInput" class="text-[10px] font-black uppercase tracking-widest text-neutral-400 px-1">Institutional Student ID</label>
                    <div class="relative">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="absolute left-4 top-1/2 -translate-y-1/2 text-neutral-400"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                        <input type="text" id="studentIdInput" placeholder="Enter Student ID" class="w-full h-14 bg-neutral-50 dark:bg-neutral-800 border-2 border-transparent focus:border-fut-blue/30 focus:ring-4 focus:ring-fut-blue/10 rounded-2xl pl-12 pr-4 outline-none transition-all font-bold text-neutral-900 dark:text-neutral-100">
                    </div>
                    <p class="text-[11px] text-neutral-400 font-bold px-1 italic">Hint: Login with <span class="text-fut-blue dark:text-blue-400 underline underline-offset-2">UBT25675</span></p>
                </div>

                <button onclick="handleLogin()" class="w-full h-14 bg-fut-blue hover:bg-blue-800 text-white font-black rounded-2xl shadow-xl shadow-fut-blue/20 transition-all active:scale-[0.98] flex items-center justify-center gap-3">
                    <span>Enter Portal</span>
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>
                </button>

                <div id="loginError" class="hidden text-center text-xs font-bold text-red-500 bg-red-50 dark:bg-red-900/10 py-3 rounded-xl animate-in">
                    Invalid Student ID. Please try again.
                </div>
            </div>

            <div class="mt-12 text-center">
                <p class="text-[10px] font-black tracking-[0.2em] text-neutral-400 uppercase">Federal University of Technology • Minna</p>
            </div>
        </div>
    </div>

    <!-- Main Portal Application -->
    <div id="app" class="hidden flex min-h-screen bg-[#F8FAFC] dark:bg-neutral-950 transition-colors duration-300">
        <!-- Sidebar -->
        <aside id="sidebar" class="fixed left-0 top-0 z-40 hidden h-screen border-r border-neutral-200 bg-white transition-all duration-300 lg:block dark:bg-neutral-900 dark:border-neutral-800 w-64">
            <div class="flex h-full flex-col p-4">
                <div class="flex items-center gap-3 mb-10 px-2">
                    <div class="flex h-10 w-10 shrink-0 items-center justify-center rounded-xl bg-fut-blue shadow-lg shadow-fut-blue/20">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-shield-check"><path d="M20 13c0 5-3.5 7.5-7.66 8.95a1 1 0 0 1-.67-.01C7.5 20.5 4 18 4 13V6a1 1 0 0 1 1-1c2 0 4.5-1.2 6.24-2.72a1.17 1.17 0 0 1 1.52 0C14.51 3.81 17 5 19 5a1 1 0 0 1 1 1z"/><path d="m9 12 2 2 4-4"/></svg>
                    </div>
                    <div>
                        <h1 class="text-sm font-black tracking-tight text-fut-blue dark:text-blue-400 uppercase">ONLINE BIO-DATA PORTAL</h1>
                        <p class="text-[10px] font-bold text-neutral-400 tracking-tighter">PORTAL V2.0</p>
                    </div>
                </div>

                <nav class="flex-1 space-y-2">
                    <a href="#dashboard" class="nav-link flex items-center gap-3 rounded-xl px-3 py-3 transition-all text-neutral-500 hover:bg-neutral-100 dark:hover:bg-neutral-800 dark:text-neutral-400" data-page="dashboard">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="7" height="9" x="3" y="3" rx="1"/><rect width="7" height="5" x="14" y="3" rx="1"/><rect width="7" height="9" x="14" y="12" rx="1"/><rect width="7" height="5" x="3" y="16" rx="1"/></svg>
                        <span class="text-sm font-semibold">Overview</span>
                    </a>
                    <a href="#bio-data" class="nav-link flex items-center gap-3 rounded-xl px-3 py-3 transition-all text-neutral-500 hover:bg-neutral-100 dark:hover:bg-neutral-800 dark:text-neutral-400" data-page="bio-data">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                        <span class="text-sm font-semibold">Bio-Data</span>
                    </a>
                    <a href="#academic" class="nav-link flex items-center gap-3 rounded-xl px-3 py-3 transition-all text-neutral-500 hover:bg-neutral-100 dark:hover:bg-neutral-800 dark:text-neutral-400" data-page="academic">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 10v6M2 10l10-5 10 5-10 5z"/><path d="M6 12v5c3 3 9 3 12 0v-5"/></svg>
                        <span class="text-sm font-semibold">Academic Record</span>
                    </a>
                    <a href="#about-me" class="nav-link flex items-center gap-3 rounded-xl px-3 py-3 transition-all text-neutral-500 hover:bg-neutral-100 dark:hover:bg-neutral-800 dark:text-neutral-400" data-page="about-me">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/></svg>
                        <span class="text-sm font-semibold">About Me</span>
                    </a>
                    <a href="#settings" class="nav-link flex items-center gap-3 rounded-xl px-3 py-3 transition-all text-neutral-500 hover:bg-neutral-100 dark:hover:bg-neutral-800 dark:text-neutral-400" data-page="settings">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></svg>
                        <span class="text-sm font-semibold">Settings</span>
                    </a>
                </nav>

                <div class="mt-auto pt-4 border-t border-neutral-100">
                    <button onclick="handleLogout()" class="flex w-full items-center gap-3 rounded-xl px-3 py-3 text-red-500 transition-all hover:bg-red-50">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
                        <span class="text-sm font-semibold">Log Out</span>
                    </button>
                </div>
            </div>
        </aside>

        <!-- Main Content -->
        <div class="flex flex-1 flex-col transition-all duration-300 lg:ml-64">
            <!-- Header -->
            <header class="sticky top-0 z-30 h-16 border-b border-neutral-200 bg-white/80 backdrop-blur-md px-4 sm:px-8 dark:bg-neutral-900/80 dark:border-neutral-800 transition-colors">
                <div class="flex h-full items-center justify-between">
                    <div class="flex items-center gap-4">
                        <button id="mobileMenuBtn" class="p-2 text-neutral-500 hover:bg-neutral-100 rounded-lg lg:hidden dark:hover:bg-neutral-800 transition-colors">
                            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="4" x2="20" y1="12" y2="12"/><line x1="4" x2="20" y1="6" y2="6"/><line x1="4" x2="20" y1="18" y2="18"/></svg>
                        </button>
                        <div class="relative hidden sm:block">
                            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="absolute left-3 top-1/2 -translate-y-1/2 text-neutral-400"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
                            <input type="text" placeholder="Search resources..." class="h-10 w-64 rounded-xl bg-neutral-100 pl-10 pr-4 text-sm outline-none transition-all focus:ring-2 focus:ring-fut-blue/20 dark:bg-neutral-800 dark:text-neutral-100">
                        </div>
                    </div>

                    <div class="flex items-center gap-2 sm:gap-4">
                        <button id="themeToggle" onclick="toggleTheme()" class="p-2 text-neutral-500 hover:bg-neutral-100 rounded-lg transition-colors dark:text-neutral-400 dark:hover:bg-neutral-800">
                            <svg id="themeIconSun" class="hidden" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M22 12h2"/><path d="m4.93 19.07 1.41-1.41"/><path d="m17.66 6.34 1.41-1.41"/></svg>
                            <svg id="themeIconMoon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/></svg>
                        </button>
                        <button class="relative p-2 text-neutral-500 hover:bg-neutral-100 rounded-lg dark:text-neutral-400 dark:hover:bg-neutral-800">
                            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9"/><path d="M10.3 21a1.94 1.94 0 0 0 3.4 0"/></svg>
                            <span class="absolute right-2 top-2 h-2 w-2 rounded-full bg-red-500 ring-2 ring-white dark:ring-neutral-900"></span>
                        </button>
                        <div class="h-8 w-[1px] bg-neutral-200 mx-2"></div>
                        <div class="flex items-center gap-3">
                            <div class="hidden text-right sm:block">
                                <p class="student-name text-sm font-bold text-neutral-900 dark:text-neutral-100">BILIKIS ADAMU</p>
                                <p class="student-id text-[10px] font-medium text-neutral-500 uppercase tracking-wider dark:text-neutral-400">UBT25675</p>
                            </div>
                            <div class="h-10 w-10 overflow-hidden rounded-full border-2 border-fut-blue/10 dark:border-fut-blue/30">
                                <img src="https://images.unsplash.com/photo-1531123897727-8f129e1688ce?w=400&h=400&fit=crop" class="h-full w-full object-cover">
                            </div>
                        </div>
                    </div>
                </div>
            </header>

            <!-- Page Container -->
            <main id="content" class="flex-1 p-4 sm:p-8">
                <!-- Pages will be injected here -->
            </main>
        </div>
    </div>

    <!-- Modals -->
    <div id="modalOverlay" class="fixed inset-0 z-50 hidden flex items-center justify-center p-4">
        <div class="absolute inset-0 bg-black/60 backdrop-blur-sm" onclick="closeModal()"></div>
        <div id="modalContent" class="relative z-10 w-full max-w-4xl overflow-hidden rounded-3xl bg-white shadow-2xl">
            <!-- Modal content injected here -->
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
