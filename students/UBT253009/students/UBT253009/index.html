<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nimzy Portfolio</title>

<style>

html{
    scroll-behavior:smooth;
}

body{
    margin:0;
    font-family:Arial;
    background:#0f172a;
    color:white;
    line-height:1.6;
}

header{
    text-align:center;
    padding:40px 20px;
    background:#111827;
}

.profile{
    width:120px;
    height:120px;
    border-radius:50%;
    border:4px solid #38bdf8;
    margin:auto;
    overflow:hidden;
}

.profile img{
    width:100%;
    height:100%;
    object-fit:cover;
}

h1{
    margin-top:15px;
}

.section{
    background:#1e293b;
    margin:20px;
    padding:20px;
    border-radius:15px;
    animation:fade 1s ease;
    transition:0.3s;
}

.section:hover{
    transform:translateY(-5px);
    box-shadow:0 0 20px rgba(56,189,248,0.3);
}

h2{
    color:#38bdf8;
}

.skill{
    display:inline-block;
    background:#334155;
    padding:8px 12px;
    margin:5px;
    border-radius:10px;
}

.btn{
    display:inline-block;
    margin:10px 5px;
    padding:12px 18px;
    background:#38bdf8;
    color:black;
    border-radius:10px;
    text-decoration:none;
    font-weight:bold;
    transition:0.3s;
}

.btn:hover{
    transform:scale(1.08);
    background:#0ea5e9;
}

.back{
    display:inline-block;
    margin:20px;
    color:#38bdf8;
    text-decoration:none;
}

footer{
    text-align:center;
    padding:20px;
    margin-top:30px;
    background:#111827;
    color:#94a3b8;
    font-size:14px;
}

@keyframes fade{
    from{
        opacity:0;
        transform:translateY(20px);
    }

    to{
        opacity:1;
        transform:translateY(0);
    }
}

.typing{
    border-right:2px solid #38bdf8;
    width:fit-content;
    margin:auto;
    white-space:nowrap;
    overflow:hidden;
    animation:typing 3s steps(30,end), blink .7s infinite;
}

@keyframes typing{
    from{width:0}
    to{width:100%}
}

@keyframes blink{
    50%{border-color:transparent}
}

body{
    animation:pageIn 0.8s ease;
}

@keyframes pageIn{
    from{
        opacity:0;
        transform:translateY(10px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

</style>
</head>
