<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Welcome | DESTINY</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --navy-deep:    #020810;
      --navy-core:    #081428;
      --navy-mid:     #0d2045;
      --gold:         #c9a84c;
      --gold-light:   #e8c97a;
      --accent:       #1a56db;
      --text-main:    #ffffff;
      --text-muted:   rgba(255,255,255,0.52);
      --glass-bg:     rgba(10,25,60,0.45);
      --glass-border: rgba(201,168,76,0.18);
    }

    html, body {
      height: 100%;
      font-family: 'DM Sans', sans-serif;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background:
        radial-gradient(ellipse 70% 55% at 50% 35%, var(--navy-mid) 0%, var(--navy-core) 55%, var(--navy-deep) 100%);
      overflow: hidden;
      position: relative;
    }

    /* Subtle grain texture */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.06'/%3E%3C/svg%3E");
      background-size: 180px 180px;
      pointer-events: none;
      z-index: 0;
      opacity: 0.28;
    }

    /* Floating glow orbs */
    .orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(90px);
      pointer-events: none;
      z-index: 0;
      animation: drift 9s ease-in-out infinite alternate;
    }
    .orb-1 {
      width: 320px; height: 320px;
      background: rgba(26,86,219,0.22);
      top: -80px; left: -60px;
      animation-delay: 0s;
    }
    .orb-2 {
      width: 260px; height: 260px;
      background: rgba(201,168,76,0.12);
      bottom: -60px; right: -40px;
      animation-delay: -4s;
    }
    @keyframes drift {
      from { transform: translate(0, 0) scale(1); }
      to   { transform: translate(20px, -20px) scale(1.08); }
    }

    /* Card */
    .card {
      position: relative;
      z-index: 1;
      width: min(88vw, 420px);
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      border-radius: 28px;
      padding: 52px 40px 44px;
      backdrop-filter: blur(20px) saturate(1.5);
      -webkit-backdrop-filter: blur(20px) saturate(1.5);
      box-shadow:
        0 0 0 1px rgba(201,168,76,0.08) inset,
        0 40px 80px rgba(0,0,0,0.65),
        0 8px 24px rgba(0,0,0,0.4);
      text-align: center;
      animation: fadeUp 0.9s cubic-bezier(0.16,1,0.3,1) both;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(40px) scale(0.96); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    /* Badge */
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 0.68rem;
      font-weight: 500;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 24px;
      animation: fadeUp 0.9s 0.1s both cubic-bezier(0.16,1,0.3,1);
    }
    .badge::before, .badge::after {
      content: '';
      flex: 1;
      height: 1px;
      background: linear-gradient(to right, transparent, rgba(201,168,76,0.4));
    }
    .badge::before { background: linear-gradient(to left, transparent, rgba(201,168,76,0.4)); }

    /* Name */
    .name-block {
      margin-bottom: 20px;
      animation: fadeUp 0.9s 0.2s both cubic-bezier(0.16,1,0.3,1);
    }
    .name-first {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(3.2rem, 14vw, 4.5rem);
      line-height: 0.95;
      color: var(--text-main);
      letter-spacing: 0.03em;
      display: block;
    }
    .name-middle {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(2.8rem, 12vw, 4rem);
      line-height: 0.95;
      color: rgba(255,255,255,0.78);
      letter-spacing: 0.03em;
      display: block;
    }
    .name-last {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(2.8rem, 12vw, 4rem);
      line-height: 0.95;
      color: rgba(255,255,255,0.38);
      letter-spacing: 0.03em;
      display: block;
    }

    /* Divider */
    .divider {
      width: 48px;
      height: 2px;
      background: linear-gradient(to right, var(--gold), rgba(201,168,76,0.1));
      margin: 20px auto;
      border-radius: 2px;
      animation: fadeUp 0.9s 0.3s both cubic-bezier(0.16,1,0.3,1);
    }

    /* Description */
    .description {
      font-size: 0.88rem;
      line-height: 1.7;
      color: var(--text-muted);
      margin-bottom: 8px;
      animation: fadeUp 0.9s 0.35s both cubic-bezier(0.16,1,0.3,1);
    }

    .meta {
      font-size: 0.78rem;
      letter-spacing: 0.04em;
      color: rgba(255,255,255,0.32);
      margin-bottom: 36px;
      animation: fadeUp 0.9s 0.4s both cubic-bezier(0.16,1,0.3,1);
    }

    /* CTA Button */
    .btn {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      padding: 18px 24px;
      background: linear-gradient(135deg, var(--gold) 0%, #a8832e 100%);
      color: #0a1828;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.82rem;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      border: none;
      border-radius: 14px;
      cursor: pointer;
      text-decoration: none;
      position: relative;
      overflow: hidden;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      box-shadow: 0 8px 28px rgba(201,168,76,0.3);
      animation: fadeUp 0.9s 0.5s both cubic-bezier(0.16,1,0.3,1);
    }
    .btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.22) 0%, transparent 60%);
      border-radius: inherit;
    }
    .btn:hover {
      transform: translateY(-2px) scale(1.01);
      box-shadow: 0 14px 36px rgba(201,168,76,0.45);
    }
    .btn:active { transform: translateY(0) scale(0.99); }

    .btn-arrow {
      width: 32px; height: 32px;
      background: rgba(0,0,0,0.15);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 1rem;
      transition: transform 0.25s ease;
    }
    .btn:hover .btn-arrow { transform: translateX(4px); }

    /* Scroll hint */
    .scroll-hint {
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      color: rgba(255,255,255,0.2);
      font-size: 0.65rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      animation: bounce 60s ease-in-out infinite;
      z-index: 2;
    }
    .scroll-hint svg { opacity: 0; }
    @keyframes bounce {
      0%, 100% { transform: translateX(-50%) translateY(0); }
      50%       { transform: translateX(-50%) translateY(-6px); }
    }
  </style>
</head>
<body>

  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>

  <div class="card">

    <div class="badge">FUT Minna &nbsp;|&nbsp; SICT</div>

    <div class="name-block">
      <span class="name-first">Enenche</span>
      <span class="name-middle">Destiny</spanview>
      <span class="name-last">Enenche</span>
    </div>

    <div class="divider"></div>

    <p class="description">
      A passionate Computer Science student exploring the intersection of
      design and technology — building clean, purposeful digital experiences
      one line of code at a time.
    </p>

    <p class="meta">B.Tech Computer Science &nbsp;·&nbsp; CPT112 Portfolio</p>

    <a href="test.html" class="btn">
      <span> GET TO KNOW ME</span>
      <span class="btn-arrow">→</span>
    </a>

  </div>

  <div class="scroll-hint">
    <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
      <path d="M8 3v10M4 9l4 4 4-4" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </div>

</body>
</html>
