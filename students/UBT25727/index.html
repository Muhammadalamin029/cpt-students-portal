<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Enenche Andrew Oche – FUTMINNA Computer Science Student & Aspiring Developer">
    <title>Welcome | Enenche Andrew Oche</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600;700&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        /* =========================================================
           VARIABLES
        ========================================================= */
        :root {
            --bg-base:       #111318;
            --accent:        #c9a96e;
            --accent-soft:   rgba(201, 169, 110, 0.10);
            --accent-glow:   rgba(201, 169, 110, 0.22);
            --glass-bg:      rgba(255, 255, 255, 0.035);
            --glass-border:  rgba(255, 255, 255, 0.08);
            --text-primary:  #e8e4dc;
            --text-muted:    #6b7280;
            --card-shadow:   0 32px 64px rgba(0, 0, 0, 0.55);
        }

        /* =========================================================
           BASE
        ========================================================= */
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        html, body {
            height: 100%;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background-color: var(--bg-base);
            color: var(--text-primary);
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            min-height: 100dvh;
        }

        /* =========================================================
           BACKGROUND — two soft orbs, JS parallax only (no competing CSS)
        ========================================================= */
        .bg-layer {
            position: fixed;
            inset: 0;
            z-index: 0;
            overflow: hidden;
            pointer-events: none;
        }

        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(110px);
            will-change: transform;
        }

        .orb-1 {
            width: 420px;
            height: 420px;
            background: radial-gradient(circle, rgba(201,169,110,0.18) 0%, transparent 70%);
            top: -10%;
            left: -8%;
        }

        .orb-2 {
            width: 380px;
            height: 380px;
            background: radial-gradient(circle, rgba(56,80,160,0.14) 0%, transparent 70%);
            bottom: -8%;
            right: -6%;
        }

        /* Subtle grain texture overlay */
        .bg-layer::after {
            content: '';
            position: absolute;
            inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.035'/%3E%3C/svg%3E");
            opacity: 0.4;
        }

        /* =========================================================
           WELCOME CARD
        ========================================================= */
        .welcome-card {
            position: relative;
            z-index: 1;
            background: var(--glass-bg);
            backdrop-filter: blur(24px) saturate(160%);
            -webkit-backdrop-filter: blur(24px) saturate(160%);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: clamp(2rem, 5vw, 3.5rem) clamp(1.5rem, 5vw, 3.5rem);
            text-align: center;
            max-width: 560px;
            width: calc(100% - 40px);
            box-shadow: var(--card-shadow);
            animation: cardReveal 1.2s cubic-bezier(0.22, 1, 0.36, 1) both;
        }

        @keyframes cardReveal {
            from { opacity: 0; transform: translateY(28px) scale(0.97); }
            to   { opacity: 1; transform: translateY(0) scale(1); }
        }

        /* Top rule line */
        .card-rule {
            width: 32px;
            height: 1px;
            background: var(--accent);
            margin: 0 auto 1.6rem;
            opacity: 0.7;
        }

        /* University label */
        .university-header {
            font-family: 'DM Sans', sans-serif;
            font-size: 0.72rem;
            letter-spacing: 0.3em;
            color: var(--accent);
            text-transform: uppercase;
            font-weight: 600;
            margin-bottom: 1rem;
            animation: fadeUp 1s 0.2s ease both;
        }

        /* Matric badge */
        .matric-tag {
            display: inline-block;
            background: var(--accent-soft);
            color: var(--accent);
            padding: 4px 14px;
            border-radius: 50px;
            font-size: 0.72rem;
            font-family: 'DM Mono', monospace;
            letter-spacing: 0.08em;
            border: 1px solid rgba(201, 169, 110, 0.25);
            margin-bottom: 2rem;
            animation: fadeUp 1s 0.35s ease both;
        }

        /* Name */
        h1 {
            font-family: 'Cormorant Garamond', serif;
            font-size: clamp(2rem, 6vw, 3.2rem);
            font-weight: 700;
            line-height: 1.1;
            background: linear-gradient(160deg, #e8e4dc 30%, #9a8c7a);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 0.6rem;
            animation: fadeUp 1s 0.5s ease both;
        }

        /* Subtitle */
        .subtitle {
            color: var(--text-muted);
            font-size: 0.85rem;
            letter-spacing: 0.08em;
            font-weight: 400;
            margin-bottom: 2.2rem;
            animation: fadeUp 1s 0.65s ease both;
        }

        /* Clock */
        #clock {
            font-family: 'DM Mono', monospace;
            font-size: 1.35rem;
            font-weight: 400;
            color: var(--text-primary);
            letter-spacing: 0.12em;
            margin-bottom: 2.4rem;
            opacity: 0.55;
            animation: fadeUp 1s 0.8s ease both;
        }

        /* CTA Button */
        .enter-btn {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background: var(--accent);
            color: #111318;
            padding: 13px 32px;
            border-radius: 10px;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.82rem;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275),
                        box-shadow 0.3s ease,
                        background 0.25s ease;
            animation: fadeUp 1s 0.95s ease both;
        }

        .enter-btn:hover {
            transform: translateY(-3px) scale(1.03);
            box-shadow: 0 0 32px var(--accent-glow);
            background: #d4b47e;
        }

        .enter-btn svg {
            transition: transform 0.3s ease;
            flex-shrink: 0;
        }

        .enter-btn:hover svg {
            transform: translateX(4px);
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(16px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* Bottom rule */
        .card-footer-rule {
            width: 100%;
            height: 1px;
            background: var(--glass-border);
            margin: 2rem 0 1.2rem;
            animation: fadeUp 1s 1.1s ease both;
        }

        .card-footer-text {
            font-size: 0.68rem;
            color: var(--text-muted);
            letter-spacing: 0.15em;
            text-transform: uppercase;
            opacity: 0.5;
            animation: fadeUp 1s 1.1s ease both;
        }
    </style>
</head>
<body>

    <!-- Background layer -->
    <div class="bg-layer" aria-hidden="true">
        <div class="orb orb-1" id="orb1"></div>
        <div class="orb orb-2" id="orb2"></div>
    </div>

    <!-- Splash card -->
    <main class="welcome-card">
        <div class="card-rule"></div>
        <p class="university-header">FUT Minna &nbsp;·&nbsp; SICT &nbsp;·&nbsp; CPT112</p>
        <span class="matric-tag">2025/1/102096CT</span>

        <h1>Enenche Andrew Oche</h1>
        <p class="subtitle">B.Tech Computer Science &nbsp;·&nbsp; 100 Level</p>

        <div id="clock" aria-live="polite" aria-label="Current time">00:00:00</div>

        <a href="R.html" class="enter-btn">
            View Full Portfolio
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <line x1="5" y1="12" x2="19" y2="12"/>
                <polyline points="12 5 19 12 12 19"/>
            </svg>
        </a>

        <div class="card-footer-rule"></div>
        <p class="card-footer-text">Federal University of Technology, Minna</p>
    </main>

    <script>
        /* ---- Live Clock ---- */
        function updateClock() {
            const now = new Date();
            const pad = n => String(n).padStart(2, '0');
            document.getElementById('clock').textContent =
                `${pad(now.getHours())}:${pad(now.getMinutes())}:${pad(now.getSeconds())}`;
        }
        setInterval(updateClock, 1000);
        updateClock();

        /* ---- Mouse Parallax (orbs only, no CSS animation conflict) ---- */
        const orb1 = document.getElementById('orb1');
        const orb2 = document.getElementById('orb2');

        let raf;
        document.addEventListener('mousemove', (e) => {
            cancelAnimationFrame(raf);
            raf = requestAnimationFrame(() => {
                const x = e.clientX / window.innerWidth  - 0.5;  // -0.5 → 0.5
                const y = e.clientY / window.innerHeight - 0.5;
                orb1.style.transform = `translate(${x * 40}px, ${y * 40}px)`;
                orb2.style.transform = `translate(${x * -30}px, ${y * -30}px)`;
            });
        });
    </script>
</body>
</html>
